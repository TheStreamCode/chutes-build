name: Package release

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish all native packages and the launcher to npm
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  CARGO_BUILD_JOBS: 2
  CARGO_TERM_COLOR: always

jobs:
  validate:
    name: Validate release metadata
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          package-manager-cache: false
      - name: Verify release versions
        run: npm run verify:release
      - name: Test launcher
        run: npm test

  native-packages:
    name: ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64-gnu
            runner: ubuntu-24.04
            binary: target/release/chutes-build
            package: chutes-build-linux-x64-gnu
          - target: linux-arm64-gnu
            runner: ubuntu-24.04-arm
            binary: target/release/chutes-build
            package: chutes-build-linux-arm64-gnu
          - target: darwin-x64
            runner: macos-15-intel
            binary: target/release/chutes-build
            package: chutes-build-darwin-x64
          - target: darwin-arm64
            runner: macos-15
            binary: target/release/chutes-build
            package: chutes-build-darwin-arm64
          - target: win32-x64
            runner: windows-2025
            binary: target/release/chutes-build.exe
            package: chutes-build-win32-x64
          - target: win32-arm64
            runner: windows-11-arm
            binary: target/release/chutes-build.exe
            package: chutes-build-win32-arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          package-manager-cache: false
      - name: Restore Cargo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ runner.arch }}-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-release-
      - name: Build native binary
        run: cargo build -p chutes-build --release --locked
      - name: Smoke-test native binary
        run: node npm/scripts/verify-native-binary.mjs "${{ matrix.binary }}"
      - name: Stage native npm package
        run: node npm/scripts/prepare-platform-package.mjs --target "${{ matrix.target }}" --binary "${{ matrix.binary }}" --out-dir staging
      - name: Create package output directory
        run: node -e "require('node:fs').mkdirSync('dist',{recursive:true})"
      - name: Pack native npm package
        run: npm pack "./staging/${{ matrix.package }}" --pack-destination dist
      - name: Write package checksum
        run: node npm/scripts/sha256-packages.mjs write dist
      - name: Upload native package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  package-smoke:
    name: Assembled npm package smoke test
    needs:
      - validate
      - native-packages
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          package-manager-cache: false
      - name: Download native packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: native-*
          path: dist
          merge-multiple: true
      - name: Verify native package checksums
        run: node npm/scripts/sha256-packages.mjs verify dist
      - name: Pack launcher
        run: npm pack --pack-destination dist
      - name: Install assembled Linux package
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          launcher="$(pwd)/dist/chutes-build-${version}.tgz"
          native="$(pwd)/dist/chutes-build-linux-x64-gnu-${version}.tgz"
          test -f "$launcher"
          test -f "$native"
          npm install --prefix target/npm-smoke --ignore-scripts --omit=optional \
            --no-audit --no-fund --no-package-lock --offline "$launcher"
          npm install --prefix target/npm-smoke --ignore-scripts --omit=optional \
            --no-audit --no-fund --no-package-lock --offline "$native"
      - name: Run assembled launcher
        run: node target/npm-smoke/node_modules/chutes-build/npm/bin/chutes-build.js --version

  publish-npm:
    name: Publish npm packages
    if: ${{ inputs.publish && github.ref == 'refs/heads/main' }}
    needs:
      - validate
      - native-packages
      - package-smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Download native packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: native-*
          path: dist
          merge-multiple: true
      - name: Verify native package checksums
        run: node npm/scripts/sha256-packages.mjs verify dist
      - name: Pack launcher
        run: npm pack --pack-destination dist
      - name: Publish native packages first
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          archives=(dist/chutes-build-darwin-*.tgz dist/chutes-build-linux-*.tgz dist/chutes-build-win32-*.tgz)
          if [[ ${#archives[@]} -ne 6 ]]; then
            echo "Expected 6 native packages, found ${#archives[@]}." >&2
            exit 1
          fi
          for archive in "${archives[@]}"; do
            # npm-package-arg treats a single-slash relative path (e.g.
            # "dist/foo.tgz") as GitHub shorthand ("user/repo") before it
            # checks whether the path exists locally, so npm publish tries
            # to `git ls-remote` it instead of reading the tarball. The `./`
            # prefix disambiguates it as an explicit local path.
            npm publish "./$archive" --access public --provenance
          done
      - name: Publish launcher
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          npm publish "./dist/chutes-build-${version}.tgz" --access public --provenance
