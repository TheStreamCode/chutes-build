name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # GitHub-hosted Linux/Windows runners have 4 vCPUs; this was needlessly
  # capped at 2, roughly doubling compile time on a cold cache. A cold
  # cache (evicted after today's several Cargo.lock-changing version
  # bumps) combined with the 60-minute job timeout let a full rebuild get
  # cancelled mid-compile, before any test ever ran.
  CARGO_BUILD_JOBS: 4
  CARGO_TERM_COLOR: always
  # CI runners have no recognized terminal brand (no WT_SESSION/TERM_PROGRAM
  # etc.), so `is_legacy_windows_console()` default-denies to legacy/ASCII
  # glyphs on the Windows runner -- unlike a real dev machine's terminal.
  # Force the modern-glyph path so Windows tests exercise the same rendering
  # as local development. No-op on non-Windows hosts.
  CHUTES_BUILD_FORCE_LEGACY_CONSOLE: "0"

jobs:
  security:
    name: Secrets and dependency policy
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out full history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install pinned Gitleaks
        shell: bash
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          set -euo pipefail
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --location --proto '=https' --tlsv1.2 --retry 3 \
            --output "$archive" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}"
          echo "${GITLEAKS_SHA256}  ${archive}" | sha256sum --check --strict
          tar --extract --gzip --file "$archive" gitleaks
          ./gitleaks version
      - name: Scan Git history for secrets
        run: ./gitleaks git . --no-banner --no-color --redact
      - name: Check dependency advisories, licenses, bans, and sources
        uses: EmbarkStudios/cargo-deny-action@3c6349835b2b7b196a839186cb8b78e02f7b5f25 # v2.1.1
        with:
          command: check
          arguments: --locked
          command-arguments: advisories licenses bans sources

  rust-quality:
    name: Rust quality (Linux)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Restore Cargo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Lint GitHub Actions workflows
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
      - name: Check Chutes Build
        run: cargo check -p chutes-build --locked
      - name: Test Chutes Build core
        run: cargo test -p chutes-build-core --locked
      - name: Test CLI parser and pager behavior
        run: |
          cargo test -p chutes-build --locked
          cargo test -p xai-grok-pager --lib --locked
          cargo test -p xai-grok-pager --test settings_e2e --locked
      - name: Test authentication and session integration
        run: "cargo test -p xai-grok-shell --lib auth:: --locked"
      - name: Test Chutes-native tools
        run: "cargo test -p xai-grok-tools --lib implementations::chutes:: --locked"
      - name: Clippy (Chutes-owned packages)
        run: |
          cargo clippy -p chutes-build -p chutes-build-core -p xai-grok-tools \
            --all-targets --locked --no-deps -- -D warnings
          cargo clippy -p xai-grok-pager --lib --locked --no-deps -- -D warnings

  npm-package:
    name: npm package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          package-manager-cache: false
      - name: Test launcher
        run: npm test
      - name: Verify release versions
        run: npm run verify:release
      - name: Inspect package contents
        run: npm pack --dry-run

  windows-check:
    name: Rust quality (Windows)
    runs-on: windows-2025
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Restore Cargo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
      - name: Check Chutes Build
        run: cargo check -p chutes-build --locked
      - name: Test CLI and pager on Windows
        run: |
          cargo test -p chutes-build --locked
          cargo test -p xai-grok-pager --lib --locked
      - name: Test authentication and tools on Windows
        run: |
          cargo test -p xai-grok-shell --lib auth:: --locked
          cargo test -p xai-grok-tools --locked

  macos-check:
    name: Rust check (macOS)
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Restore Cargo cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-
      - name: Check Chutes Build
        run: cargo check -p chutes-build --locked
      - name: Test pager on macOS
        run: cargo test -p xai-grok-pager --lib --locked
